<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS STUDIO | Autonomous AI App Generator</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER BAR */
        header { background: #000; border-bottom: 2px solid #00ff00; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .logo { font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 8px #00ff00; }
        .nav-btn { background: transparent; border: 1px solid #00ff00; color: #00ff00; padding: 6px 12px; font-family: monospace; cursor: pointer; text-decoration: none; font-size: 0.85rem; }
        .nav-btn:hover { background: #00ff00; color: #000; }

        /* MATRIX CANVAS BACKGROUND */
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; opacity: 0.15; }

        /* STUDIO MAIN LAYOUT */
        .workspace { display: grid; grid-template-columns: 320px 1fr 1fr; gap: 15px; padding: 15px; height: calc(100vh - 60px); position: relative; z-index: 1; }

        /* PANELS */
        .panel { background: rgba(5, 10, 5, 0.9); border: 1px solid #00ff00; border-radius: 4px; display: flex; flex-direction: column; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .panel-header { background: rgba(0, 30, 0, 0.8); border-bottom: 1px solid #00ff00; padding: 10px; font-weight: bold; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }

        /* PANEL 1: PROMPT ENGINE */
        .prompt-container { padding: 15px; display: flex; flex-direction: column; gap: 15px; height: 100%; }
        textarea { width: 100%; height: 180px; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 12px; font-family: monospace; resize: none; outline: none; font-size: 0.9rem; }
        textarea:focus { border-color: #55ff55; box-shadow: 0 0 8px rgba(0,255,0,0.3); }
        
        .generate-btn { background: #00ff00; color: #000; border: none; padding: 14px; font-weight: bold; font-family: monospace; cursor: pointer; font-size: 1rem; transition: 0.2s; box-shadow: 0 0 12px rgba(0,255,0,0.4); }
        .generate-btn:hover { background: #55ff55; transform: translateY(-1px); }

        .presets-title { font-size: 0.8rem; color: #aaa; margin-top: 10px; }
        .preset-btn { background: transparent; border: 1px dashed #008800; color: #00dd00; padding: 8px; text-align: left; font-family: monospace; cursor: pointer; font-size: 0.8rem; }
        .preset-btn:hover { border-color: #00ff00; color: #00ff00; background: rgba(0,255,0,0.05); }

        /* PANEL 2: SOURCE CODE EDITOR */
        .tabs { display: flex; background: #000; border-bottom: 1px solid #00ff00; }
        .tab { padding: 8px 16px; border-right: 1px solid #004400; cursor: pointer; font-size: 0.85rem; color: #00aa00; }
        .tab.active { background: rgba(0,50,0,0.5); color: #00ff00; font-weight: bold; border-bottom: 2px solid #00ff00; }
        #codeEditor { width: 100%; height: 100%; background: #050505; color: #00ff00; border: none; padding: 15px; font-family: monospace; outline: none; font-size: 0.85rem; line-height: 1.4; }

        /* PANEL 3: LIVE PREVIEW */
        .preview-wrapper { width: 100%; height: 100%; background: #fff; border: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <header>
        <div class="logo">> NEXUS STUDIO WORKSPACE _</div>
        <a href="index.html" class="nav-btn"><< BACK TO HUB</a>
    </header>

    <div class="workspace">
        
        <!-- PANEL 1: PROMPT INTENT ENGINE -->
        <div class="panel">
            <div class="panel-header">
                <span>[ 1. INTENT ENGINE ]</span>
                <span style="font-size: 0.75rem; color: #888;">AI MODEL: NEXUS-v3</span>
            </div>
            <div class="prompt-container">
                <textarea id="appPrompt" placeholder="Describe the web app or game you want to build or modify..."></textarea>
                
                <button class="generate-btn" onclick="generateApp()">[ 🚀 GENERATE & LAUNCH ]</button>

                <div class="presets-title">QUICK STARTER TEMPLATES:</div>
                <button class="preset-btn" onclick="loadPreset('pomodoro')">⏱️ Pomodoro Productivity Timer</button>
                <button class="preset-btn" onclick="loadPreset('crypto')">📈 Live Crypto Price Ticker Card</button>
                <button class="preset-btn" onclick="loadPreset('todo')">📋 Kanban Task Workspace</button>
            </div>
        </div>

        <!-- PANEL 2: SOURCE CODE VIEW -->
        <div class="panel">
            <div class="panel-header">
                <span>[ 2. SOURCE CODE ]</span>
                <button onclick="updatePreviewFromEditor()" style="background:transparent; border:1px solid #00ff00; color:#00ff00; padding:2px 8px; cursor:pointer; font-size:0.75rem;">[ REFRESH PREVIEW ]</button>
            </div>
            <div class="tabs">
                <div id="tab-html" class="tab active" onclick="switchTab('html')">index.html</div>
                <div id="tab-css" class="tab" onclick="switchTab('css')">styles.css</div>
                <div id="tab-js" class="tab" onclick="switchTab('js')">app.js</div>
            </div>
            <textarea id="codeEditor" oninput="updatePreviewFromEditor()"></textarea>
        </div>

        <!-- PANEL 3: LIVE INTERACTIVE PREVIEW -->
        <div class="panel">
            <div class="panel-header">
                <span>[ 3. LIVE INTERACTIVE PREVIEW ]</span>
                <span id="previewStatus" style="font-size: 0.75rem; color: #00ff00;">● LIVE</span>
            </div>
            <div class="preview-wrapper">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>

    </div>

    <script src="studio.js"></script>
</body>
</html>
